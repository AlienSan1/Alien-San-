<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro Alien San | Conéctate</title>
    <link rel="stylesheet" href="../styles/index.css">
    <style>
        .reg-container {
            max-width: 450px;
            margin: 60px auto;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: var(--acc-blue);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .btn-full {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--acc-blue), var(--acc-green));
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
        }
    </style>
</head>

<body style="background: radial-gradient(circle at center, #111 0%, #050505 100%);">

    <div class="reg-container card" style="background: rgba(0,0,0,0.8);">
        <h1 class="alien-font" style="color: var(--acc-blue); font-size: 1.5rem;">BIENVENIDO AL SISTEMA</h1>
        <p style="color: #888; font-size: 0.9rem; margin-bottom: 30px;">Inicia tu viaje de fidelización exponencial.</p>

        <form id="regForm">
            <input type="text" id="regName" placeholder="Nombre Completo" required>
            <input type="email" id="regEmail" placeholder="Correo Electrónico" required>
            <input type="tel" id="regPhone" placeholder="Teléfono" required>
            <div style="text-align: left; margin-top: 20px;">
                <label
                    style="font-size: 0.7rem; color: var(--acc-green); text-transform: uppercase; letter-spacing: 1px;">Código
                    de Recomendación</label>
                <input type="text" id="regInviteCode" placeholder="ALN-XXXX" style="border-color: var(--acc-green);">
            </div>

            <p style="font-size: 0.75rem; color: #555; margin-top: 15px;">
                Al unirte, aceptas que tus consumos premien a quien te conectó y que tú recibas premios por conectar a
                otros.
            </p>

            <button type="submit" class="btn-full">UNIRME A LA RED</button>
        </form>
    </div>

    <script type="module">
        import { supabase } from '../logic/supabaseClient.js';
        import InvitationService from '../logic/invitationService.js';

        const inviteService = new InvitationService();

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const inviteCode = document.getElementById('regInviteCode').value;

            const newUser = {
                id: 'ALN-' + Math.random().toString(36).substr(2, 6).toUpperCase(),
                name,
                email,
                phone,
                joined_at: new Date().toISOString()
            };

            // 1. Assign Referrer (Spillover logic)
            const referrerId = await inviteService.assignReferrer(newUser, inviteCode);
            newUser.referrer_id = referrerId;

            // 2. Save to Supabase
            const { error } = await supabase
                .from('users')
                .insert(newUser);

            if (error) {
                alert("Error al registrar: " + error.message);
            } else {
                alert(`¡Alien registrado con éxito! Tu código es: ${newUser.id}`);
                window.location.href = 'PortalAlien.html?id=' + newUser.id;
            }
        });
    </script>

    <div style="text-align: center; color: #333; font-size: 0.7rem; margin-top: 40px;">
        POWERED BY ALIEN SAN ECOSYSTEM
    </div>
</body>

</html>
